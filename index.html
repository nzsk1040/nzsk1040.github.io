<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SHAGAET</title>
  <meta name="description" content="SHAGAET" />

  <style>
    @font-face{
      font-family:"TT Firs Neue";
      src:url("./TTFirsNeue-Bold.woff2") format("woff2");
      font-weight:700;
      font-style:normal;
      font-display:swap;
    }

    :root{
      --bg:#070A12;
      --card: rgba(255,255,255,.06);
      --border: rgba(255,255,255,.12);
      --text: rgba(255,255,255,.92);
      --muted: rgba(255,255,255,.65);
      --accent:#7C5CFF;
      --accent2:#2DD4BF;
      --shadow: 0 30px 90px rgba(0,0,0,.45);
      --radius: 22px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      color: var(--text);
      background: var(--bg);
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, "Noto Sans", sans-serif;
      overflow-x:hidden;
    }

    /* Animated background */
    .bg{
      position:fixed;
      inset:0;
      z-index:-2;
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(124,92,255,.35), transparent 60%),
        radial-gradient(850px 520px at 85% 25%, rgba(45,212,191,.22), transparent 62%),
        radial-gradient(700px 520px at 50% 110%, rgba(255,255,255,.06), transparent 55%),
        var(--bg);
      filter: saturate(1.1);
    }
    .spacer{
      height: 140vh; /* сделай 200vh если хочешь ещё длиннее */
      display: grid;
      place-items: center;
      border-radius: var(--radius);
      border: 1px dashed rgba(255,255,255,.14);
      background: rgba(255,255,255,.03);
      margin-top: 18px;
      color: rgba(255,255,255,.35);
      font-size: 12px;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .orb{
      position:fixed;
      width: 520px;
      height: 520px;
      border-radius: 50%;
      z-index:-1;
      filter: blur(22px);
      opacity:.55;
      mix-blend-mode: screen;
      animation: float 12s ease-in-out infinite;
    }
    .orb.one{
      left:-140px;
      top:-160px;
      background: radial-gradient(circle at 30% 30%, rgba(124,92,255,.9), rgba(124,92,255,0) 60%);
      animation-duration: 13s;
    }
    .orb.two{
      right:-180px;
      top: 80px;
      background: radial-gradient(circle at 40% 40%, rgba(45,212,191,.85), rgba(45,212,191,0) 62%);
      animation-duration: 15s;
      animation-delay: -3s;
    }
    @keyframes float{
      0%,100%{ transform: translate(0,0) scale(1); }
      50%{ transform: translate(14px, -18px) scale(1.05); }
    }

    .wrap{
      width:min(1040px, 100%);
      margin:0 auto;
      padding: 28px 16px 64px;
    }

    .glass{
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      border-radius: var(--radius);
      backdrop-filter: blur(12px);
    }

    header{
      padding-top: 22px;
    }

    .hero{
      padding: 30px 22px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }

    .hero::before{
      content:"";
      position:absolute;
      inset:-2px;
      background: linear-gradient(135deg, rgba(124,92,255,.30), rgba(45,212,191,.18), transparent 60%);
      opacity:.55;
      filter: blur(18px);
      pointer-events:none;
    }

    .hero > *{ position:relative; z-index:1; }

    .pill{
      display:inline-flex;
      align-items:center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(0,0,0,.18);
      color: rgba(255,255,255,.68);
      font-size: 12px;
      letter-spacing: .02em;
    }
    .dot{
      width: 8px; height: 8px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 20px rgba(124,92,255,.5);
    }

    h1{
      margin: 18px 0 8px;
      font-family: "TT Firs Neue", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      font-weight: 700;
      letter-spacing: .10em;
      text-transform: uppercase;
      font-size: clamp(44px, 7vw, 92px);
      line-height: 1;
      transform: translateY(10px);
      opacity: 0;
      animation: reveal 700ms cubic-bezier(.2,.8,.2,1) 120ms forwards;
    }

    .subtitle{
      margin: 0 auto 18px;
      max-width: 62ch;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
      transform: translateY(10px);
      opacity: 0;
      animation: reveal 700ms cubic-bezier(.2,.8,.2,1) 240ms forwards;
    }

    @keyframes reveal{
      to { transform: translateY(0); opacity: 1; }
    }

    .actions{
      display:flex;
      gap: 12px;
      justify-content:center;
      flex-wrap:wrap;
      transform: translateY(10px);
      opacity: 0;
      animation: reveal 700ms cubic-bezier(.2,.8,.2,1) 360ms forwards;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 14px;
      text-decoration:none;
      color: var(--text);
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.06);
      transition: transform .15s ease, border-color .15s ease, background .15s ease;
      will-change: transform;
    }
    .btn:hover{
      transform: translateY(-1px);
      border-color: rgba(255,255,255,.26);
      background: rgba(255,255,255,.09);
    }
    .btn.primary{
      border-color: rgba(124,92,255,.45);
      background: rgba(124,92,255,.16);
    }
    .btn.primary:hover{
      border-color: rgba(124,92,255,.75);
      background: rgba(124,92,255,.22);
    }

    .section-head{
      margin-top: 18px;
      display:flex;
      align-items: end;
      justify-content: space-between;
      gap: 12px;
      color: rgba(255,255,255,.70);
    }
    .section-head h2{
      margin:0;
      font-size: 14px;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .section-head .meta{
      font-size: 12px;
      color: rgba(255,255,255,.45);
    }

    .grid{
      margin-top: 12px;
      display:grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 12px;
    }

    .card{
      grid-column: span 4;
      border-radius: 18px;
      overflow:hidden;
      border: 1px solid var(--border);
      background: rgba(0,0,0,.18);
      transform: translateY(14px);
      opacity: 0;
    }

    .card img{
      width:100%;
      height: 240px;
      object-fit: cover;
      display:block;
      filter: saturate(1.05) contrast(1.03);
      transition: transform .25s ease;
    }
    .card:hover img{
      transform: scale(1.03);
    }

    .cap{
      padding: 12px 12px 14px;
      color: rgba(255,255,255,.70);
      font-size: 12px;
    }

    /* reveal on scroll */
    .inview{
      animation: pop 650ms cubic-bezier(.2,.8,.2,1) forwards;
    }
    @keyframes pop{
      to{ transform: translateY(0); opacity:1; }
    }

    /* Big end block */
    .end{
      margin-top: 18px;
      padding: 34px 18px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: rgba(255,255,255,.04);
      text-align:center;
      overflow:hidden;
      transform: translateY(16px);
      opacity: 0;
    }

    .end .big{
      margin: 0;
      font-family: "TT Firs Neue", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      font-weight: 700;
      letter-spacing: .10em;
      text-transform: uppercase;
      font-size: clamp(40px, 8vw, 110px);
      line-height: .95;
      background: linear-gradient(90deg, rgba(255,255,255,.92), rgba(124,92,255,.92), rgba(45,212,191,.92));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      filter: drop-shadow(0 14px 40px rgba(0,0,0,.35));
    }

    .end .small{
      margin: 10px 0 0;
      color: rgba(255,255,255,.55);
      font-size: 12px;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    footer{
      margin-top: 18px;
      text-align:center;
      color: rgba(255,255,255,.45);
      font-size: 12px;
    }

    @media (max-width: 920px){
      .card{ grid-column: span 6; }
    }
    @media (max-width: 560px){
      .hero{ padding: 24px 16px; }
      .card{ grid-column: span 12; }
      .card img{ height: 220px; }
    }

    @media (prefers-reduced-motion: reduce){
      .orb, h1, .subtitle, .actions, .card, .end{ animation: none !important; }
      h1, .subtitle, .actions, .card, .end{ opacity:1; transform:none; }
    }
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="orb one" aria-hidden="true"></div>
  <div class="orb two" aria-hidden="true"></div>

  <div class="wrap">
    <header>
      <section class="hero glass">
        <div class="pill"><span class="dot"></span> online • <span id="dt"></span></div>
        <h1>SHAGAET</h1>
        <p class="subtitle">и оно свой куриный хуй показывает</p>

        <div class="actions">
          <!-- ЗАМЕНИ ссылку на свой TG -->
          <a class="btn primary" href="https://t.me/shagaet" target="_blank" rel="noopener">Telegram</a>
          <a class="btn" href="#gallery">Фото</a>
        </div>
      </section>
    </header>

    <section>
      <div class="section-head">
        <h2 id="gallery">Фотографии</h2>
        <div class="meta">© <span id="y"></span> shagaet.ru</div>
      </div>

      <div class="grid">
        <!-- Поменяй пути/подписи под свои -->
        <article class="card">
          <img src="img/pig.jpg" alt="Фото 1">
          <div class="cap">Фото 1</div>
        </article>

        <article class="card">
          <img src="img/2.jpg" alt="Фото 2">
          <div class="cap">Фото 2</div>
        </article>

        <article class="card">
          <img src="img/3.jpg" alt="Фото 3">
          <div class="cap">Фото 3</div>
        </article>
      </div>
      <section class="spacer" aria-hidden="true">
        scroll ↓
      </section>
      <!-- Большая надпись внизу (появится при доскролле) -->
      <section class="end" id="the-end">
        <h3 class="big">АРТУР</h3>
        <p class="small">ты животное ебанутое</p>
      </section>

      <footer>??</footer>
    </section>
  </div>

  <script>
    // dates
    const now = new Date();
    document.getElementById("y").textContent = now.getFullYear();
    document.getElementById("dt").textContent = now.toLocaleDateString("ru-RU");

    // reveal cards on scroll
    const cards = document.querySelectorAll(".card");
    const io = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          e.target.classList.add("inview");
          io.unobserve(e.target);
        }
      });
    }, { threshold: 0.12 });
    cards.forEach((c) => io.observe(c));

    // reveal big end title at the bottom
    const end = document.querySelector("#the-end");
    const endObs = new IntersectionObserver((entries) => {
      entries.forEach((e) => {
        if (e.isIntersecting) {
          end.classList.add("inview");
          endObs.unobserve(end);
        }
      });
    }, { threshold: 0.25 });
    endObs.observe(end);
  </script>
</body>
</html>
