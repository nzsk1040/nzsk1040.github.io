<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SHAGAET</title>
  <meta name="description" content="SHAGAET" />

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- (Опционально) твой шрифт: положи рядом файл TTFirsNeue-Bold.woff2 -->
  <style>
    @font-face {
      font-family: "TT Firs Neue";
      src: url("./TTFirsNeue-Bold.woff2") format("woff2");
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }

    :root{
      --bg: #070A12;
    }

    body {
      min-height: 100vh;
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(124,92,255,.35), transparent 60%),
        radial-gradient(850px 520px at 85% 25%, rgba(45,212,191,.22), transparent 62%),
        var(--bg);
    }

    .brand-title{
      font-family: "TT Firs Neue", system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      font-weight: 700;
      letter-spacing: .10em;
    }

    .glass{
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.12);
      backdrop-filter: blur(10px);
    }

    .img-card{
      overflow: hidden;
    }
    .img-card img{
      aspect-ratio: 4 / 3;
      object-fit: cover;
      transition: transform .25s ease;
    }
    .img-card:hover img{
      transform: scale(1.03);
    }
  </style>
</head>

<body class="text-white">
  <header class="py-5">
    <div class="container">
      <div class="glass rounded-4 p-4 p-md-5 text-center">
        <div class="small text-white-50 mb-2">??</div>
        <h1 class="brand-title display-4 mb-3">SHAGAET</h1>

        <div class="d-flex gap-2 justify-content-center flex-wrap">
          <!-- ЗАМЕНИ на свою ссылку -->
          <a class="btn btn-primary btn-lg" href="https://t.me/shagaet" target="_blank" rel="noopener">
            Telegram
          </a>
          <a class="btn btn-outline-light btn-lg" href="#gallery">Фото</a>
        </div>
      </div>
    </div>
  </header>

  <main class="pb-5">
    <div class="container">
      <div class="d-flex align-items-end justify-content-between gap-3 mb-3">
        <h2 id="gallery" class="h4 m-0 text-white-75">пиодорство</h2>
        <div class="small text-white-50">??</div>
      </div>

      <!-- Галерея -->
      <div class="row g-3">
        <!-- Карточка 1 -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card glass text-white rounded-4 img-card">
            <img src="img/pig.jpg" class="card-img-top" alt="Фото 1">
            <div class="card-body">
              <div class="small text-white-50">быдло</div>
            </div>
          </div>
        </div>

        <!-- Карточка 2 (пример — замени файл) -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card glass text-white rounded-4 img-card">
            <img src="img/2.jpg" class="card-img-top" alt="Фото 2">
            <div class="card-body">
              <div class="small text-white-50">животное</div>
            </div>
          </div>
        </div>

        <!-- Карточка 3 (пример — замени файл) -->
        <div class="col-12 col-sm-6 col-lg-4">
          <div class="card glass text-white rounded-4 img-card">
            <img src="img/3.jpg" class="card-img-top" alt="Фото 3">
            <div class="card-body">
              <div class="small text-white-50">??</div>
            </div>
          </div>
        </div>

      </div>

      <footer class="pt-4 mt-4 text-center text-white-50 small">
        © <span id="y"></span> shagaet.ru
      </footer>
    </div>
  </main>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
